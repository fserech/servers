<div class="modal-overlay">
  <div class="modal-panel p-7" style="width:490px">
    <div class="flex items-center gap-3 mb-5">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center text-lg flex-shrink-0"
        style="background:linear-gradient(135deg,var(--ac-red),#c00)">⏻</div>
      <div>
        <div class="font-orbitron font-black" style="font-size:15px;letter-spacing:.07em;color:var(--ac-red)">APAGAR SERVIDOR</div>
        <div class="font-mono" style="font-size:10px;color:var(--tx-4);margin-top:2px">{{server.hostname}} · {{server.ip}} · {{server.location}}</div>
      </div>
    </div>
    <div class="mb-4"><label class="form-label">Motivo de apagado *</label>
      <select [(ngModel)]="selectedReason" class="input-field">
        <option *ngFor="let r of reasons" [value]="r">{{r}}</option></select></div>
    <div class="mb-5"><label class="form-label">Detalle adicional</label>
      <input [(ngModel)]="detail" class="input-field" placeholder="Descripción adicional (opcional)..."/></div>
    <div class="rounded-lg px-4 py-3 mb-4" style="background:var(--tint-red-bg);border:1px solid var(--tint-red-br);font-size:11px;color:var(--ac-red)">
      ⚠ Esta acción quedará registrada en auditoría con usuario y timestamp.
    </div>
    <div class="flex gap-3 justify-end">
      <button class="btn-ghost" (click)="close.emit()">Cancelar</button>
      <button class="btn-danger" (click)="confirm()">Confirmar Apagado</button>
    </div>
  </div>
</div>
