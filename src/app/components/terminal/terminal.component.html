<div class="animate-fade-up">
  <div class="flex items-center gap-3 mb-3 flex-wrap">
    <div class="section-label" style="margin-bottom:0">TERMINAL ADMINISTRATIVA SSH</div>
    <div class="flex gap-2 ml-auto flex-wrap">
      <button *ngFor="let cmd of ['status','top','alerts','uptime']"
        (click)="quickRun(cmd)"
        class="font-mono rounded-lg filter-pill" style="padding:5px 13px;font-size:10px">{{cmd}}</button>
    </div>
  </div>

  <div class="term-window flex flex-col" style="height:calc(100vh - 175px)" (click)="focus()">
    <!-- Title bar -->
    <div class="term-bar">
      <div class="w-3 h-3 rounded-full" style="background:#ff5f57"></div>
      <div class="w-3 h-3 rounded-full" style="background:#ffbd2e"></div>
      <div class="w-3 h-3 rounded-full" style="background:#28c840"></div>
      <span class="font-mono ml-2" style="font-size:11px;color:var(--ac-blue);letter-spacing:.08em">
        admin&#64;infra-control:~$
      </span>
      <span class="ml-auto font-mono" style="font-size:9px;color:#1a2535">SSH · AES-256-GCM · Puerto 22</span>
    </div>

    <!-- Output body -->
    <div #termBody class="term-body flex-1">
      <div *ngFor="let line of lines" [class.mb-2]="line.type==='output'">
        <div *ngIf="line.type==='prompt'">
          <span style="color:var(--ac-blue)">admin&#64;infra</span><span style="color:var(--ac-purple)">:</span><span style="color:var(--ac-amber)">~</span><span style="color:#cce"> # </span><span style="color:#fff">{{line.text}}</span>
        </div>
        <div *ngIf="line.type==='sys'"     class="term-sys"     [innerHTML]="line.text"></div>
        <div *ngIf="line.type==='output'"  class="term-output"  [innerHTML]="line.text"></div>
        <div *ngIf="line.type==='error'"   class="term-error">{{line.text}}</div>
        <div *ngIf="line.type==='success'" class="term-success">{{line.text}}</div>
        <div *ngIf="line.type==='warn'"    class="term-warn"    [innerHTML]="line.text"></div>
      </div>
      <!-- Input line -->
      <div class="flex items-center">
        <span style="color:var(--ac-blue)">admin&#64;infra</span><span style="color:var(--ac-purple)">:</span><span style="color:var(--ac-amber)">~</span><span style="color:#cce"> # </span>
        <input #termInput [(ngModel)]="input" (keydown)="onKey($event)"
          style="flex:1;background:none;border:none;outline:none;color:#fff;font-family:'Share Tech Mono',monospace;font-size:12px;caret-color:var(--ac-blue)"
          autocomplete="off" spellcheck="false" autofocus/>
        <span class="animate-blink" style="color:var(--ac-blue);font-size:14px">█</span>
      </div>
    </div>
  </div>
</div>
